<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form + GIF</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #d38b7f, #5c6bc0, #1a1a2e);
    flex-direction: column;
}

.container {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
    color: #fff;
    transition: opacity 0.5s ease;
}

.container h2 {
    letter-spacing: 3px;
    margin-bottom: 10px;
}

.line {
    height: 1px;
    background: rgba(255,255,255,0.3);
    margin: 15px 0 25px;
}

.input-group {
    margin-bottom: 15px;
    position: relative;
}

.input-group input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.4);
    color: #fff;
    outline: none;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin: 10px 0 20px;
    color: #ddd;
}

.row a {
    color: #ddd;
    text-decoration: none;
}

.row a:hover {
    text-decoration: underline;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #ff4d4d;
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 0 #c0392b;
}

button:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #c0392b;
}

#gifContainer {
    display: none;
    margin-top: 20px;
    transform: scale(0.5);
    transition: transform 0.6s ease, opacity 0.6s ease;
    opacity: 0;
}

#gifContainer.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}

#gifContainer iframe {
    width: 300px;
    height: 300px;
    border: none;
}
</style>
</head>

<body>

<div class="container" id="loginContainer">
    <h2>WELCOME</h2>
    <div class="line"></div>

    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="row">
        <label>
            <input type="checkbox"> Remember me
        </label>
        <a href="#">Forgot Password?</a>
    </div>

    <button onclick="login()">LOGIN</button>
</div>

<!-- GIF container menggunakan iframe Tenor -->
<div id="gifContainer">
    <iframe src="https://tenor.com/embed/21672244" allowfullscreen></iframe>
</div>

<script>
function login() {
    var user = document.getElementById('username').value;
    var pass = document.getElementById('password').value;

    if(user && pass) {
        // sembunyikan form
        var container = document.getElementById('loginContainer');
        container.style.opacity = 0;
        setTimeout(function() {
            container.style.display = 'none';
            
            // tampilkan GIF dengan efek zoom
            var gif = document.getElementById('gifContainer');
            gif.classList.add('show');
        }, 500);
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Full Screen</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>

<video id="player" autoplay muted></video>

<script>
  const videos = ["video1.mp4", "video2.mp4", "video3.mp4"];
  let i = 0;
  const player = document.getElementById("player");

  function nextVideo() {
    player.src = videos[i];
    player.play();
    i = (i + 1) % videos.length;
  }

  nextVideo();
  player.addEventListener("ended", nextVideo);
</script>

</body>
</html>
